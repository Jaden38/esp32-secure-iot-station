; ============================================================================
;  esp32-secure-iot-station — PlatformIO project configuration
; ----------------------------------------------------------------------------
;  Plateforme : pioarduino (fork communautaire) -> Arduino-ESP32 core 3.x
;    Raison : le platform officiel `espressif32` est figé sur le core 2.x.
;    pioarduino fournit le core 3.x (état de l'art 2025-2026), supporte tous
;    les chips (classique, S3, C3/C6/H2/P4) et est requis par esp32async/*.
;    Pour changer de carte : modifier UNIQUEMENT la ligne `board`.
;  Réf : https://github.com/pioarduino/platform-espressif32
; ============================================================================

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; --- Système de fichiers pour l'UI web embarquée (/data) ---
board_build.filesystem = littlefs

build_flags =
    -D CORE_DEBUG_LEVEL=3            ; logs IDF (0=none .. 5=verbose)
    -D CONFIG_ARDUHAL_LOG_COLORS=1
    ; HAS_OLED=0 : pas d'écran physique -> supervision = Serial + OLED virtuel
    ;   (panneau web /api/supervision). Passer à 1 pour piloter un vrai SSD1306
    ;   U8g2 sur I²C (aucune autre modif nécessaire).
    -D HAS_OLED=0

; ----------------------------------------------------------------------------
;  Dépendances — versions vérifiées comme état de l'art (juin 2026)
;   - ArduinoJson 7.x : API JsonDocument unifiée, validation typée
;   - PubSubClient 2.8 : MQTT QoS 1, léger, FreeRTOS-friendly
;   - DHTesp (beegee-tokyo) : DHT22 sur ESP32 (temp/hum, 1-wire) — PROVISOIRE,
;       choix définitif à figer en tâche #2 (candidats : DHTesp, lib RMT non
;       bloquante, Adafruit DHT). DHT22 n'est PAS sur le bus I²C.
;   - U8g2 : pilote OLED SSD1306 (seul périphérique I²C restant)
;   - esp32async/* : fork MAINTENU de l'écosystème AsyncWebServer
;     (me-no-dev a transféré le projet à l'organisation ESP32Async)
; ----------------------------------------------------------------------------
lib_deps =
    bblanchon/ArduinoJson @ ^7.2.0
    knolleary/PubSubClient @ ^2.8
    beegee-tokyo/DHT sensor library for ESPx @ ^1.19   ; header: DHTesp.h
    olikraus/U8g2 @ ^2.35.30
    esp32async/AsyncTCP @ ^3.3.2
    esp32async/ESPAsyncWebServer @ ^3.6.0
