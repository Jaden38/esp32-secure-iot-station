# ============================================================================
#  Stack serveur central — esp32-secure-iot-station
#  Broker MQTT (Mosquitto, auth) + Node-RED + MongoDB (NoSQL)
#  + bonus : InfluxDB (TSDB) + Grafana (dashboard + alerte)
#
#  Démarrage :  docker compose up -d        (depuis ce dossier server/)
#  Identifiants MQTT par défaut : iot / change-me  (alignés sur secrets.h ESP32)
# ============================================================================
services:

  mosquitto:
    build:
      context: ./mosquitto
      args:
        MQTT_USER: iot
        MQTT_PASS: change-me
    container_name: iot-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mosquitto_data:/mosquitto/data

  mongodb:
    image: mongo:7
    container_name: iot-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  influxdb:
    image: influxdb:2.7
    container_name: iot-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=esp32admin
      - DOCKER_INFLUXDB_INIT_ORG=esi
      - DOCKER_INFLUXDB_INIT_BUCKET=iot
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=esp32-iot-token
    volumes:
      - influx_data:/var/lib/influxdb2

  nodered:
    build: ./nodered
    container_name: iot-nodered
    restart: unless-stopped
    ports:
      - "1880:1880"
    depends_on:
      - mosquitto
      - mongodb
      - influxdb
    volumes:
      - ./nodered/flows.json:/data/flows.json
      - nodered_data:/data

  grafana:
    image: grafana/grafana:11.1.0
    container_name: iot-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=esp32admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana

volumes:
  mosquitto_data:
  mongo_data:
  influx_data:
  nodered_data:
  grafana_data:
